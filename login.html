<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>GreenGo - Perfil</title><link rel="stylesheet" href="css/style.css"></head><body><div class="screen-bg login"></div><main class="menu-shell"><section class="panel"><div class="brand"><div class="logo-badge">🌿</div><div><h1 style="font-size:clamp(38px,8vw,72px)">Perfil</h1><p class="subtitle">Antes de jogar, crie seu explorador ecológico. Isso deixa a experiência com progresso salvo no navegador.</p></div></div><div class="form"><label class="field"><span>Nome do jogador</span><input id="nome" placeholder="Digite seu nome"></label><label class="field"><span>E-mail ou apelido</span><input id="email" placeholder="exemplo@email.com"></label><label class="field"><span>Dificuldade</span><select id="dif"><option value="normal">Normal - recomendado</option><option value="facil">Fácil - mais vidas</option><option value="desafio">Desafio - menos tolerância</option></select></label><button class="btn primary" onclick="go()">Entrar no jogo</button><button class="btn secondary" onclick="Core.transition('index.html')">Voltar</button></div></section></main><div class="fade"></div><script src="js/core.js"></script><script>function go(){const n=document.getElementById('nome').value.trim();const e=document.getElementById('email').value.trim();if(!n||!e){alert('Preencha nome e e-mail/apelido.');return}Core.save('nome',n);Core.save('email',e);Core.save('dif',document.getElementById('dif').value);Core.save('score',0);Core.save('fase','jogo.html');Core.transition('jogo.html')}</script></body></html>

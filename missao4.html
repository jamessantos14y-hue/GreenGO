<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>GreenGo - Missão Final</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body class="mission-final">
  <canvas id="game"></canvas>

  <div class="game-ui">
    <div class="top-hud">
      <div class="hud-card" id="hudText"></div>
      <div class="hud-card" id="hudStats"></div>
    </div>

    <div class="touch-controls">
      <div class="touch-pad">
        <button class="touch-btn" type="button" data-hold="left">◀</button>
        <button class="touch-btn" type="button" data-hold="right">▶</button>
      </div>

      <div class="touch-actions">
        <button class="touch-btn" type="button" data-tap="action">E</button>
        <button class="touch-btn big" type="button" data-hold="jump">⤒</button>
      </div>
    </div>
  </div>

  <div class="fade"></div>

  <script src="js/core.js" defer></script>
  <script src="js/mission4.js" defer></script>
</body>
</html>
